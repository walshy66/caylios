# Fly.io config for the SimpleTS FastAPI backend (COA-272).
# Deploy: fly deploy --config backend/fly.toml --dockerfile backend/Dockerfile
app = "sts-api"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  STS_AUTH_MODE = "clerk"
  STS_BASE_DOMAIN = "simplets.com.au"
  STS_EXTRACTION_PROVIDER = "claude"

# Secrets (set via `fly secrets set`, never in this file):
#   STS_ENCRYPTION_KEY, ANTHROPIC_API_KEY, CLERK_ISSUER, CLERK_AUTHORIZED_PARTIES,
#   STS_PLATFORM_ADMINS, STS_HUBSPOT_CLIENT_ID/SECRET, STS_GOOGLE_DRIVE_CLIENT_ID/SECRET,
#   STS_PANDADOC_CLIENT_ID/SECRET, STS_XERO_CLIENT_ID/SECRET

[[mounts]]
  source = "sts_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
