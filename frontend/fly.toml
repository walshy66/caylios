# Fly.io config for the SimpleTS React frontend (COA-272).
# Serves all subscriber subdomains (wildcard cert on *.simplets.com.au).
app = "sts-web"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/"
